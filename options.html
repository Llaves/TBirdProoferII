<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LLM Proofreader Settings</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.2em;
      margin-bottom: 20px;
      color: #333;
    }
    .setting-group {
      margin-bottom: 20px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .setting-group h2 {
      margin-top: 0;
      font-size: 1em;
    }
    .button-group {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }
    .provider-radio-group {
      display: flex;
      gap: 20px;
      margin-bottom: 0;
      padding: 12px 15px 10px;
      background: #fff;
      border: 1px solid #ddd;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
    }
    .provider-radio-group label {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    /* Card below radios loses its top radius so it reads as one unit */
    .provider-radio-group + .setting-group {
      border-radius: 0 0 4px 4px;
    }
    .model-row {
      margin-top: 8px;
    }
    .model-row label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.9em;
    }
    .model-row input[type="text"] {
      width: 100%;
      padding: 5px;
      box-sizing: border-box;
      margin-bottom: 4px;
    }
    #modelHint {
      font-size: 0.82em;
      color: #666;
      margin: 0;
    }
    .key-row {
      margin-bottom: 14px;
    }
    .key-row:last-of-type {
      margin-bottom: 0;
    }
    .key-row label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.9em;
    }
    .key-row input[type="password"] {
      width: 100%;
      padding: 5px;
      box-sizing: border-box;
      margin-bottom: 2px;
    }
    .key-status {
      font-size: 0.82em;
      color: #555;
      margin: 0 0 4px 0;
    }
    button {
      padding: 5px 10px;
      cursor: pointer;
    }
    hr.key-divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 12px 0;
    }
    #output {
      height: 36px;
      overflow: hidden;  /* or overflow-y: auto if you want it scrollable */
      margin-top: 10px;
      padding: 10px;
      border-radius: 4px;
      background-color: #f0f0f0;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <h1>LLM Proofreader Settings</h1>

  <!-- Provider selector sits above the card as a tab-style header -->
  <div class="provider-radio-group">
    <label>
      <input type="radio" name="provider" value="gemini" id="providerGemini">
      Google Gemini
    </label>
    <label>
      <input type="radio" name="provider" value="openrouter" id="providerOpenRouter">
      OpenRouter
    </label>
  </div>

  <!-- Provider + API Key Settings (one unified card, content scoped to selected provider) -->
  <div class="setting-group">
    <h2>Provider Settings</h2>

    <div class="model-row">
      <label for="modelName">Model name:</label>
      <input type="text" id="modelName" placeholder="Enter model name">
      <p id="modelHint"></p>
    </div>

    <div class="button-group">
      <button id="saveModelButton">Save Model</button>
    </div>

    <hr class="key-divider">

    <h2>API Key Settings</h2>

    <!-- Gemini Key -->
    <div class="key-row" id="geminiKeyRow">
      <label for="geminiApiKey">Google Gemini API Key:</label>
      <input type="password" id="geminiApiKey" placeholder="Enter your Gemini API key">
      <p class="key-status" id="geminiKeyStatus"></p>
      <div class="button-group">
        <button id="saveGeminiKeyButton">Save</button>
        <button id="viewGeminiKeyButton">View</button>
        <button id="removeGeminiKeyButton">Remove</button>
      </div>
    </div>

    <!-- OpenRouter Key -->
    <div class="key-row" id="openrouterKeyRow">
      <label for="openrouterApiKey">OpenRouter API Key:</label>
      <input type="password" id="openrouterApiKey" placeholder="Enter your OpenRouter API key">
      <p class="key-status" id="openrouterKeyStatus"></p>
      <div class="button-group">
        <button id="saveOpenRouterKeyButton">Save</button>
        <button id="viewOpenRouterKeyButton">View</button>
        <button id="removeOpenRouterKeyButton">Remove</button>
      </div>
    </div>
  </div>

  <!-- Prompt Settings -->
  <div class="setting-group">
    <h2>Prompt Settings</h2>
    <button id="promptsButton">Manage Prompts</button>
  </div>

  <div id="output"></div>

  <script src="options.js"></script>
</body>
</html>
